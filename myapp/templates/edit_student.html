<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="col-md-6 mx-auto">
        <div class="card shadow p-4">
            <h3>Edit Profile</h3>

            <form method="POST">
                {% csrf_token %}

                <input type="text" name="first_name" value="{{ student.first_name }}" class="form-control mb-3" required>
                <input type="text" name="last_name" value="{{ student.last_name }}" class="form-control mb-3" required>
                <input type="email" name="email" value="{{ student.email }}" class="form-control mb-3" required>
                <input type="text" name="phone" value="{{ student.phone }}" class="form-control mb-3" required>

                <select name="gender" class="form-control mb-3">
                    <option value="male" {% if student.gender == 'male' %}selected{% endif %}>Male</option>
                    <option value="female" {% if student.gender == 'female' %}selected{% endif %}>Female</option>
                </select>

                <input type="text" name="course" value="{{ student.course }}" class="form-control mb-3" required>

                <button type="submit" class="btn btn-success w-100">Update</button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
