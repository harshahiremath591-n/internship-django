<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Student Dashboard</span>
        <a href="{% url 'logout' %}" class="btn btn-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h4 class="mb-4">Welcome, {{ student.first_name }}</h4>

        <table class="table table-bordered">
            <tr>
                <th>First Name</th>
                <td>{{ student.first_name }}</td>
            </tr>
            <tr>
                <th>Last Name</th>
                <td>{{ student.last_name }}</td>
            </tr>
            <tr>
                <th>Email</th>
                <td>{{ student.email }}</td>
            </tr>
            <tr>
                <th>Phone</th>
                <td>{{ student.phone }}</td>
            </tr>
            <tr>
                <th>Gender</th>
                <td>{{ student.gender }}</td>
            </tr>
            <tr>
                <th>Course</th>
                <td>{{ student.course }}</td>
            </tr>
            <tr>
                <th>Username</th>
                <td>{{ student.username }}</td>
            </tr>
        </table>

        <div class="mt-3">
            <a href="{% url 'edit_student' %}" class="btn btn-warning">Edit Profile</a>
            <a href="{% url 'delete_student' %}" class="btn btn-danger"
               onclick="return confirm('Are you sure you want to delete your account?')">
               Delete Account
            </a>
        </div>
    </div>

</div>

</body>
</html>
