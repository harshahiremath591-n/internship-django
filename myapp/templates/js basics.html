<!DOCTYPE html>
<html>

<head>
    <title>JS Basics</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #09f8cc, #ACB6E5);
            text-align: center;
            padding: 30px;
        }
        
        h1 {
            color: white;
        }
        
        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #0af212;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #2e7d32;
        }
        
        input {
            padding: 8px;
            margin: 5px;
            width: 80%;
            border-radius: 6px;
            border: 1px solid rgb(26, 26, 26);
        }
        
        .result {
            font-weight: bold;
            color: #202020;
        }
    </style>
</head>

<body>

    <h1> JavaScript Basics</h1>

    <!-- Alert -->
    <div class="card">
        <h3>Alert Button</h3>
        <button onclick="alertMsg()">Click Me</button>
    </div>

    <!-- Form -->
    <div class="card">
        <h3>Form Validation</h3>
        <input type="text" id="name" placeholder="Enter Name"><br>
        <input type="email" id="email" placeholder="Enter Email"><br>
        <button onclick="validate()">Submit</button>
        <p id="msg"></p>
    </div>

    <!-- Calculator -->
    <div class="card">
        <h3>Calculator</h3>
        <input type="number" id="a" placeholder="Number 1">
        <input type="number" id="b" placeholder="Number 2"><br>
        <button onclick="calc('+')">+</button>
        <button onclick="calc('-')">-</button>
        <button onclick="calc('*')">*</button>
        <button onclick="calc('/')">/</button>
        <p class="result" id="res"></p>
    </div>

    <!-- Change Text -->
    <div class="card">
        <h3>Change Text</h3>
        <p id="text">Thank You!</p>
        <button onclick="change()">Change</button>
    </div>

    <script>
        function alertMsg() {
            alert("Button Clicked!");
        }

        function validate() {
            let n = document.getElementById("name").value;
            let e = document.getElementById("email").value;

            if (n == "" || e == "")
                msg.innerHTML = "Fill all fields";
            else
                msg.innerHTML = "Submitted Successfully";
        }

        function calc(op) {
            let x = parseFloat(a.value);
            let y = parseFloat(b.value);
            let r;

            if (isNaN(x) || isNaN(y))
                r = "Enter numbers";
            else if (op == "+") r = x + y;
            else if (op == "-") r = x - y;
            else if (op == "*") r = x * y;
            else r = (y != 0) ? x / y : "Cannot divide by 0";

            res.innerHTML = "Result: " + r;
        }

        function change() {
            text.innerHTML = "Text Changed!";
        }
    </script>

</body>

</html>
