<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Div Layout Box Model</title>
    <style>
        body {
            margin: 0;
            font-family: 'Gill sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        
        .header {
            background: #065eca;
            color: rgb(255, 255, 255);
            text-align: center;
            padding: 20px;
            border: 5px solid black;
            margin: 10px;
        }
        
        .navbar {
            background: #0bd312;
            padding: 15px;
            margin: 10px;
            border: 3px solid black;
        }
        
        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }
        
        .content {
            background: #a5a5a5;
            padding: 30px;
            margin: 10px;
            border: 3px dashed black;
            min-height: 200px;
        }
        
        .footer {
            background: #07e124;
            color: white;
            text-align: center;
            padding: 15px;
            margin: 10px;
            border: 2px solid black;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>My Website</h1>

    </div>

    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">login</a>
        <a href="#">Contact</a>
    </div>

    <div class="content">
        <h2>Main heading....//-</h2>
        <p>...write a details...</p>
    </div>

    <div class="footer">
        <p>@harshahiremath591</p>
    </div>

</body>

</html>
